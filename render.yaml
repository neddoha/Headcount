services:
  - type: web
    name: shift-headcount-app
    env: python
    plan: free
    buildCommand: ""
    startCommand: python backend/server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: APP_ENV
        value: production
      - key: COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_NAME
        value: shift_headcount_session
      - key: DATA_DIR
        value: /tmp/shift-headcount-data
